version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:?set SA_PASSWORD in docker/.env}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrator
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ConnectionStrings__FcEngine=Server=sqlserver;Database=FcEngine;User Id=sa;Password=${SA_PASSWORD:?set SA_PASSWORD in docker/.env};TrustServerCertificate=True
      - Seeding__SchemaFilePath=/app/schema.sql
      - Seeding__MetadataSchemaPath=/app/scripts/create-metadata-schema.sql
      - Seeding__ReferenceDataPath=/app/scripts/seed-reference-data.sql
      - Seeding__AutoSeed=true
      - DefaultAdmin__Password=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in docker/.env}
    volumes:
      - ../schema.sql:/app/schema.sql:ro
      - ../scripts:/app/scripts:ro
      - ../../Templates:/app/Templates:ro

  api:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      migrator:
        condition: service_completed_successfully
    ports:
      - "5100:8080"
    environment:
      - ConnectionStrings__FcEngine=Server=sqlserver;Database=FcEngine;User Id=sa;Password=${SA_PASSWORD:?set SA_PASSWORD in docker/.env};TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Transport__RequireHttps=false
      - ApiKey=${API_KEY:?set API_KEY in docker/.env}
      - Seeding__SchemaFilePath=/app/schema.sql
    volumes:
      - ../schema.sql:/app/schema.sql:ro
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  admin:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    depends_on:
      migrator:
        condition: service_completed_successfully
    ports:
      - "5200:8080"
    environment:
      - ConnectionStrings__FcEngine=Server=sqlserver;Database=FcEngine;User Id=sa;Password=${SA_PASSWORD:?set SA_PASSWORD in docker/.env};TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Transport__RequireHttps=false
      - HealthCheck__ApiBaseUrl=http://api:8080
      - Seeding__SchemaFilePath=/app/schema.sql
    volumes:
      - ../schema.sql:/app/schema.sql:ro
    healthcheck:
      test: curl -f http://localhost:8080/login || exit 1
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  portal:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    build:
      context: ..
      dockerfile: docker/Dockerfile.portal
    depends_on:
      migrator:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    ports:
      - "5300:8080"
    environment:
      - ConnectionStrings__FcEngine=Server=sqlserver;Database=FcEngine;User Id=sa;Password=${SA_PASSWORD:?set SA_PASSWORD in docker/.env};TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Transport__RequireHttps=false
      - EngineApi__BaseUrl=http://api:8080
      - RegOS__PortalBaseUrl=http://localhost:5300
    healthcheck:
      test: curl -f http://localhost:8080/login || exit 1
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  sqlserver-data:
